<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Permissions-Policy" content="microphone=*">
<title>Self-Audit — A Personal Clearing Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { background: #0b0d17; color: #e8dcc8; font-family: 'Jost', sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(201,160,80,0.25); border-radius: 4px; }
  ::placeholder { color: #5a5248; }
  textarea:focus, input:focus { outline: none; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes micPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(220,80,80,0.4); } 50% { box-shadow: 0 0 0 8px rgba(220,80,80,0); } }
  .fade-in { animation: fadeIn 0.4s ease forwards; }
  button { font-family: 'Jost', sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const C = {
  bg: "#0b0d17",
  panel: "#13162a",
  gold: "#c9a050",
  goldDim: "rgba(201,160,80,0.25)",
  goldFaint: "rgba(201,160,80,0.08)",
  text: "#e8dcc8",
  textMuted: "#8a7f6e",
  textDim: "#5a5248",
  border: "rgba(201,160,80,0.18)",
  white: "#f0e8d8",
};

const serif = { fontFamily: "'Cormorant Garamond', serif" };

const PROCESSES = [
  { id: "confront", name: "Confront", glyph: "◎", tagline: "Face what you've been avoiding",
    description: "Build the ability to face a person, situation, or problem directly until the charge lifts and freedom is restored.",
    opening: "Think of a person, situation, or area of life you want to be able to face more freely." },
  { id: "engram", name: "Engram Running", glyph: "◈", tagline: "Move through a painful incident",
    description: "Locate a past incident containing pain or unconsciousness and run it through to erasure using Dianetic techniques.",
    opening: "Think of a painful or difficult incident you would like to run." },
  { id: "ow", name: "Overts & Withholds", glyph: "◇", tagline: "Clear harmful acts and secrets",
    description: "Locate and fully communicate overts (harmful acts) and withholds (secrets) that are suppressing your life force.",
    opening: "Think of a person or group you would like to clear your overts and withholds on." },
  { id: "ptp", name: "Present Time Problem", glyph: "◉", tagline: "Release what's occupying your now",
    description: "Identify and run out problems that are keeping you stuck in the present or pulling your attention away from living.",
    opening: "We'll locate and run out what's been occupying your present time and attention." },
  { id: "help", name: "Help Process", glyph: "◐", tagline: "Ease a strained relationship",
    description: "Run the Help button on a person or terminal to reduce antagonism, increase ARC, and restore good feeling.",
    opening: "Think of a person you would like to improve your relationship with." },
  { id: "communication", name: "Communication", glyph: "◑", tagline: "Open a blocked comm line",
    description: "Run out communication difficulties with a terminal to restore the free flow of ARC and understanding.",
    opening: "Think of a person you have difficulty communicating with or feel incomplete communication with." },
  { id: "fixed", name: "Fixed Ideas", glyph: "◌", tagline: "Break a stuck computation",
    description: "Locate and release a fixed idea or service facsimile that has been limiting your freedom and ability to change.",
    opening: "Think of an area of your life where you feel stuck, or an idea you hold that you can't seem to move past." },
];

function buildSystemPrompt(process, target) {
  const guides = {
    confront: `PROCESS: Confront\nTARGET: ${target}\nCOMMANDS (alternating):\n- "What part of ${target || '[target]'} can you confront?"\n- "Look at ${target || '[target]'}. What do you notice?"\n- "Is there anything about ${target || '[target]'} you have been unwilling to look at?"\nRun repetitively. EP: PC laughs, feels relief, cognites, feels free to face the area.`,
    engram: `PROCESS: Dianetic Engram Running\nINCIDENT: ${target}\nPROCEDURE:\n1. "Move to the beginning of the incident."\n2. "Move through the incident and tell me what happens."\n3. After narration: "Go back to the beginning of the incident." Run again.\n4. Continue multiple passes until erasure or key-out.\nIf needed: "Is there an earlier similar incident? Move to it."\nEP: Incident becomes neutral or vanishes. PC feels relief, cognites.`,
    ow: `PROCESS: Overts & Withholds\nTERMINAL: ${target}\nCOMMANDS (alternating):\n- "What have you done to ${target || '[terminal]'}?"\n- "Is there anything you have withheld from ${target || '[terminal]'}?"\n- "Have you had any unkind thoughts about ${target || '[terminal]'}?"\n- "What have you done that you wouldn't want ${target || '[terminal]'} to know about?"\nEP: PC feels lighter, cleaner, free.`,
    ptp: `PROCESS: Present Time Problem\nFOCUS: ${target || "general present time"}\nCOMMANDS:\n- "What problem do you have?"\n- "What is your present time problem?"\n- "What problem could you have?"\nEP: PC feels present, clear-headed, no longer pulled.`,
    help: `PROCESS: Help Process\nTERMINAL: ${target}\nCOMMANDS (alternating):\n- "What could you help ${target || '[terminal]'} with?"\n- "What could ${target || '[terminal]'} help you with?"\n- "How could you help ${target || '[terminal]'}?"\n- "How could ${target || '[terminal]'} help you?"\nEP: PC feels warm toward terminal, cognites on relationship.`,
    communication: `PROCESS: Communication Process\nTERMINAL: ${target}\nCOMMANDS (alternating):\n- "Is there something you could say to ${target || '[terminal]'}?"\n- "Is there something ${target || '[terminal]'} could say to you?"\n- "What would you like ${target || '[terminal]'} to know?"\n- "What would you like to know from ${target || '[terminal]'}?"\nEP: PC feels ARC restored, completeness.`,
    fixed: `PROCESS: Fixed Ideas / Service Facsimile\nAREA: ${target}\nCOMMANDS:\n- "What is your fixed idea about ${target || '[area]'}?"\n- "How does holding that idea help you?"\n- "What would happen if that idea were not true?"\n- "What problem does that idea solve for you?"\n- "Can you think of a time when the opposite was true?"\nEP: PC recognizes the computation, laughs, feels released.`,
  };

  return `You are a skilled, calm Scientology auditor conducting a self-audit session. The preclear is doing solo auditing with your guidance.

AUDITOR'S CODE — STRICT RULES:
1. NEVER evaluate — never tell the PC what their answer means or interpret it for them
2. NEVER invalidate — never question, correct, or doubt their data
3. ALWAYS acknowledge before asking the next command: use "Good.", "Thank you.", "I got that.", "OK." — vary these naturally
4. Ask only ONE auditing command per message
5. Keep your messages SHORT — auditing is about the PC's attention being on their case, not on reading your words
6. Use repetitive processing — ask the same command (or alternating commands) until End Phenomena
7. End Phenomena indicators: sudden relief, laughter, feeling of floating/freedom, realization/cognition, Very Good Indicators
8. When EP is clearly reached: acknowledge warmly, note it as an EP, say the process is complete — offer to end session or run another

SESSION OPENING PROCEDURE:
First, say "Start of session." Then:
- Check rudiments: "Is there anything going on in your life right now that might need to be handled first?"
- If yes, handle briefly. If no, proceed to the process.
Then: "The process we'll be running is ${process?.name}. ${guides[process?.id] ? '' : '[Opening question]'}"

${guides[process?.id] || ""}

TONE: Professional, warm but not sentimental. Precise. Brief. You are here to help the PC look at their own mind. Let silences exist. Trust the process.

When the PC has a cognition: "Very good." or "That's a cognition." — acknowledge without evaluating. Ask if they want to continue or end.`;
}

async function callAuditor(apiKey, systemPrompt, messages) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      messages,
    }),
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`API error ${res.status}: ${err}`);
  }
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.map(b => b.type === "text" ? b.text : "").filter(Boolean).join("\n");
}

function App() {
  const [screen, setScreen] = useState("welcome");
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("sa_apikey") || "");
  const [showKey, setShowKey] = useState(false);
  const [selectedProcess, setSelectedProcess] = useState(null);
  const [target, setTarget] = useState("");
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [cognitions, setCognitions] = useState([]);
  const [sessionSeconds, setSessionSeconds] = useState(0);
  const [timerActive, setTimerActive] = useState(false);
  const [showSidebar, setShowSidebar] = useState(false);
  const [noteInput, setNoteInput] = useState("");
  const [sendError, setSendError] = useState(null);
  const [voiceEnabled, setVoiceEnabled] = useState(true);
  const [isListening, setIsListening] = useState(false);
  const [isSpeaking, setIsSpeaking] = useState(false);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);
  const timerRef = useRef(null);
  const recognitionRef = useRef(null);
  const prevMsgLen = useRef(0);
  const audioUnlocked = useRef(false);
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.matchMedia('(pointer: coarse)').matches;

  // Save API key
  useEffect(() => {
    if (apiKey) localStorage.setItem("sa_apikey", apiKey);
  }, [apiKey]);

  // Timer
  useEffect(() => {
    if (timerActive) timerRef.current = setInterval(() => setSessionSeconds(s => s + 1), 1000);
    else clearInterval(timerRef.current);
    return () => clearInterval(timerRef.current);
  }, [timerActive]);

  // Scroll to bottom
  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, loading]);

  // Stop speech when disabled
  useEffect(() => {
    if (!voiceEnabled) { window.speechSynthesis?.cancel(); setIsSpeaking(false); }
  }, [voiceEnabled]);

  const formatTime = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;

  // Unlock iOS audio — must be called from a user gesture
  const unlockAudio = useCallback(() => {
    if (audioUnlocked.current || !("speechSynthesis" in window)) return;
    const utt = new SpeechSynthesisUtterance("");
    utt.volume = 0;
    window.speechSynthesis.speak(utt);
    audioUnlocked.current = true;
  }, []);

  // TTS — load voices then speak
  const speakText = useCallback((text) => {
    if (!voiceEnabled || !("speechSynthesis" in window)) return;
    const doSpeak = () => {
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.rate = 0.87; utt.pitch = 0.95; utt.volume = 1;
      const voices = window.speechSynthesis.getVoices();
      const preferred = voices.find(v =>
        v.name.includes("Daniel") || v.name.includes("Karen") ||
        v.name.includes("Samantha") || v.name.includes("Google UK English Female") ||
        v.name.includes("Victoria") || v.name.includes("Moira") ||
        (v.lang.startsWith("en") && v.localService)
      );
      if (preferred) utt.voice = preferred;
      utt.onstart = () => setIsSpeaking(true);
      utt.onend = () => setIsSpeaking(false);
      utt.onerror = () => setIsSpeaking(false);
      window.speechSynthesis.speak(utt);
    };
    // Voices may not be loaded yet
    const voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) { doSpeak(); }
    else { window.speechSynthesis.onvoiceschanged = () => { doSpeak(); window.speechSynthesis.onvoiceschanged = null; }; }
  }, [voiceEnabled]);

  // Auto-speak new auditor messages
  useEffect(() => {
    if (messages.length > prevMsgLen.current) {
      const latest = messages[messages.length - 1];
      if (latest && latest.role === "assistant" && !latest.hidden) speakText(latest.content);
    }
    prevMsgLen.current = messages.length;
  }, [messages, speakText]);

  const startListening = useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (isListening || !SR) {
      if (!SR) setSendError("Speech recognition not available in this browser. Try Chrome or Edge.");
      return;
    }
    window.speechSynthesis?.cancel();
    setIsSpeaking(false);
    const r = new SR();
    r.continuous = true;
    r.interimResults = true;
    r.lang = "en-AU";
    r.onstart = () => setIsListening(true);
    r.onresult = (e) => {
      let final = "", interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      setInput(final || interim);
    };
    r.onend = () => { setIsListening(false); recognitionRef.current = null; };
    r.onerror = (e) => {
      setIsListening(false);
      recognitionRef.current = null;
      if (e.error === "not-allowed") setSendError("Microphone access denied. Please allow microphone access in your browser and try again.");
    };
    recognitionRef.current = r;
    r.start();
  }, [isListening]);

  const stopListening = useCallback(() => {
    recognitionRef.current?.stop();
    setIsListening(false);
  }, []);

  const toggleListening = useCallback(() => {
    if (isListening) {
      stopListening();
    } else {
      startListening();
    }
  }, [isListening, startListening, stopListening]);

  const endSession = useCallback(() => {
    window.speechSynthesis?.cancel();
    setIsSpeaking(false);
    setIsListening(false);
    recognitionRef.current?.stop();
    setTimerActive(false);
    setScreen("close");
  }, []);

  const startSession = useCallback(async () => {
    if (!selectedProcess || !apiKey.trim()) return;
    unlockAudio();
    setScreen("session");
    setTimerActive(true);
    setSendError(null);
    setLoading(true);
    try {
      const sys = buildSystemPrompt(selectedProcess, target);
      const reply = await callAuditor(apiKey, sys, [{ role: "user", content: "Begin the session." }]);
      setMessages([{ role: "user", content: "Begin the session.", hidden: true }, { role: "assistant", content: reply }]);
    } catch(e) {
      setMessages([{ role: "assistant", content: `Error starting session: ${e.message}` }]);
    } finally { setLoading(false); }
  }, [selectedProcess, target, apiKey]);

  const sendMessage = useCallback(async () => {
    if (!input.trim() || loading) return;
    const saved = input.trim();
    const savedMsgs = messages;
    setMessages([...messages, { role: "user", content: saved }]);
    setInput("");
    setSendError(null);
    setLoading(true);
    try {
      const sys = buildSystemPrompt(selectedProcess, target);
      const newMsgs = [...messages, { role: "user", content: saved }];
      const apiMsgs = newMsgs.filter(m => !m.hidden).map(({ role, content }) => ({ role, content }));
      const reply = await callAuditor(apiKey, sys, apiMsgs);
      setMessages([...newMsgs, { role: "assistant", content: reply }]);
    } catch(e) {
      setMessages(savedMsgs);
      setInput(saved);
      setSendError(e.message);
    } finally {
      setLoading(false);
      setTimeout(() => inputRef.current?.focus(), 100);
    }
  }, [input, loading, messages, selectedProcess, target, apiKey]);

  const addCognition = () => {
    if (!noteInput.trim()) return;
    setCognitions(c => [...c, { text: noteInput.trim(), time: formatTime(sessionSeconds) }]);
    setNoteInput("");
  };

  const resetState = () => {
    setMessages([]); setInput(""); setCognitions([]); setSessionSeconds(0);
    setSelectedProcess(null); setTarget(""); setSendError(null);
  };

  // ─── WELCOME ────────────────────────────────────────────────────────────────
  if (screen === "welcome") return (
    <div style={{ minHeight:"100vh", background:C.bg, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px" }}>
      <div className="fade-in" style={{ textAlign:"center", maxWidth:"480px", width:"100%" }}>
        <div style={{ width:64, height:64, margin:"0 auto 28px", border:`1px solid ${C.gold}`, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", color:C.gold, fontSize:24 }}>◎</div>
        <h1 style={{ ...serif, fontSize:42, fontWeight:300, color:C.white, letterSpacing:"0.04em", marginBottom:8 }}>Self-Audit</h1>
        <p style={{ ...serif, fontSize:18, fontStyle:"italic", color:C.gold, marginBottom:24 }}>A Personal Clearing Session</p>
        <div style={{ width:40, height:1, background:C.gold, margin:"0 auto 28px", opacity:0.6 }}/>
        <p style={{ fontSize:14, fontWeight:300, color:C.textMuted, lineHeight:1.8, marginBottom:32 }}>
          Guided self-audit sessions using an AI auditor trained in the Auditor's Code.
          Your Anthropic API key is required and stored locally on your device only.
        </p>

        {/* API Key input */}
        <div style={{ marginBottom:32, textAlign:"left" }}>
          <p style={{ fontSize:11, color:C.textMuted, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:8 }}>Anthropic API Key</p>
          <div style={{ display:"flex", gap:8 }}>
            <input
              type={showKey ? "text" : "password"}
              value={apiKey}
              onChange={e => setApiKey(e.target.value)}
              placeholder="sk-ant-..."
              style={{ flex:1, background:C.panel, border:`1px solid ${C.border}`, color:C.text, fontSize:14, padding:"12px 14px", fontFamily:"monospace" }}
            />
            <button onClick={() => setShowKey(v => !v)} style={{ background:C.panel, border:`1px solid ${C.border}`, color:C.textMuted, padding:"12px 14px", cursor:"pointer", fontSize:12 }}>
              {showKey ? "Hide" : "Show"}
            </button>
          </div>
          <p style={{ fontSize:11, color:C.textDim, marginTop:6 }}>
            Get your key at <a href="https://console.anthropic.com" target="_blank" style={{ color:C.gold }}>console.anthropic.com</a> — stored in your browser only, never sent anywhere except Anthropic.
          </p>
        </div>

        <button
          onClick={() => apiKey.trim() ? setScreen("select") : null}
          disabled={!apiKey.trim()}
          style={{ background:"transparent", border:`1px solid ${apiKey.trim() ? C.gold : C.border}`, color:apiKey.trim() ? C.gold : C.textDim, fontSize:13, fontWeight:500, letterSpacing:"0.15em", textTransform:"uppercase", padding:"14px 48px", cursor:apiKey.trim() ? "pointer" : "not-allowed", transition:"all 0.2s" }}
          onMouseEnter={e => { if(apiKey.trim()) e.target.style.background = C.goldFaint; }}
          onMouseLeave={e => { e.target.style.background = "transparent"; }}
        >Begin</button>
      </div>
    </div>
  );

  // ─── PROCESS SELECTION ───────────────────────────────────────────────────────
  if (screen === "select") return (
    <div style={{ minHeight:"100vh", background:C.bg, padding:"48px 24px" }}>
      <div className="fade-in" style={{ maxWidth:720, margin:"0 auto" }}>
        <button onClick={() => setScreen("welcome")} style={{ background:"none", border:"none", color:C.textMuted, cursor:"pointer", fontSize:13, letterSpacing:"0.1em", marginBottom:32, padding:0 }}>← Back</button>
        <h2 style={{ ...serif, fontSize:32, fontWeight:300, color:C.white, marginBottom:8 }}>Select a Process</h2>
        <p style={{ color:C.textMuted, fontSize:14, marginBottom:28 }}>Choose what you want to work on in this session.</p>

        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(300px, 1fr))", gap:12, marginBottom:32 }}>
          {PROCESSES.map(p => (
            <div key={p.id} onClick={() => setSelectedProcess(p)}
              style={{ padding:20, border:`1px solid ${selectedProcess?.id === p.id ? C.gold : C.border}`, background:selectedProcess?.id === p.id ? C.goldFaint : C.panel, cursor:"pointer", transition:"all 0.2s" }}
              onMouseEnter={e => { if(selectedProcess?.id !== p.id) { e.currentTarget.style.borderColor = C.goldDim; e.currentTarget.style.background = "rgba(201,160,80,0.04)"; }}}
              onMouseLeave={e => { if(selectedProcess?.id !== p.id) { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.background = C.panel; }}}
            >
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6 }}>
                <span style={{ color:C.gold, fontSize:18 }}>{p.glyph}</span>
                <span style={{ ...serif, fontSize:18, fontWeight:500, color:C.white }}>{p.name}</span>
              </div>
              <p style={{ fontSize:12, color:C.gold, letterSpacing:"0.08em", marginBottom:6 }}>{p.tagline}</p>
              <p style={{ fontSize:13, color:C.textMuted, lineHeight:1.6 }}>{p.description}</p>
            </div>
          ))}
        </div>

        {selectedProcess && (
          <div className="fade-in">
            <div style={{ borderTop:`1px solid ${C.border}`, paddingTop:24, marginBottom:20 }}>
              <p style={{ fontSize:13, color:C.textMuted, marginBottom:10, letterSpacing:"0.08em", textTransform:"uppercase" }}>
                {selectedProcess.id === "ptp" ? "Focus area (optional)" : "Target of this process"}
              </p>
              <input value={target} onChange={e => setTarget(e.target.value)}
                placeholder={selectedProcess.opening}
                style={{ width:"100%", background:C.panel, border:`1px solid ${C.border}`, color:C.text, fontSize:15, padding:"14px 16px", fontWeight:300 }}
              />
            </div>
            <button onClick={startSession}
              style={{ background:C.gold, border:"none", color:"#0b0d17", fontSize:13, fontWeight:500, letterSpacing:"0.15em", textTransform:"uppercase", padding:"16px 48px", cursor:"pointer", width:"100%", transition:"opacity 0.2s" }}
              onMouseEnter={e => e.target.style.opacity="0.85"} onMouseLeave={e => e.target.style.opacity="1"}
            >Start Session — {selectedProcess.name}</button>
          </div>
        )}
      </div>
    </div>
  );

  // ─── SESSION ─────────────────────────────────────────────────────────────────
  if (screen === "session") return (
    <div style={{ height:"100vh", display:"flex", flexDirection:"column", background:C.bg }}>

      {/* Header */}
      <div style={{ borderBottom:`1px solid ${C.border}`, padding:"10px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", background:C.panel, flexShrink:0, flexWrap:"wrap", gap:8 }}>
        <div style={{ display:"flex", alignItems:"center", gap:14, flexWrap:"wrap" }}>
          <span style={{ color:C.gold, fontSize:16 }}>{selectedProcess?.glyph}</span>
          <span style={{ ...serif, fontSize:16, color:C.white, fontWeight:500 }}>{selectedProcess?.name}</span>
          {target && <span style={{ fontSize:12, color:C.textMuted, borderLeft:`1px solid ${C.border}`, paddingLeft:14 }}>{target}</span>}
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
          <span style={{ fontFamily:"monospace", fontSize:13, color:C.textMuted }}>{formatTime(sessionSeconds)}</span>

          {/* Voice toggle */}
          <button onClick={() => setVoiceEnabled(v => !v)}
            style={{ background:voiceEnabled ? C.goldFaint : "none", border:`1px solid ${voiceEnabled ? C.goldDim : C.border}`, color:voiceEnabled ? C.gold : C.textDim, cursor:"pointer", fontSize:11, letterSpacing:"0.08em", padding:"5px 10px", display:"flex", alignItems:"center", gap:6 }}
          >
            {isSpeaking ? (
              <span style={{ display:"flex", gap:2, alignItems:"center" }}>
                {[0,1,2].map(i => <span key={i} style={{ display:"inline-block", width:3, height:10, background:C.gold, borderRadius:2, animation:`pulse 0.8s ease-in-out ${i*0.15}s infinite` }}/>)}
              </span>
            ) : "♪"}
            {voiceEnabled ? "Voice On" : "Voice Off"}
          </button>

          <button onClick={() => setShowSidebar(v => !v)}
            style={{ background:"none", border:`1px solid ${C.border}`, color:C.textMuted, cursor:"pointer", fontSize:11, letterSpacing:"0.08em", padding:"5px 10px" }}
          >Notes {cognitions.length > 0 && `(${cognitions.length})`}</button>

          <button onClick={endSession}
            style={{ background:"none", border:`1px solid ${C.border}`, color:C.gold, cursor:"pointer", fontSize:11, letterSpacing:"0.08em", padding:"5px 10px" }}
          >End Session</button>
        </div>
      </div>

      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>
        {/* Messages */}
        <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <div style={{ flex:1, overflowY:"auto", padding:"32px 24px", maxWidth:700, margin:"0 auto", width:"100%" }}>
            {messages.filter(m => !m.hidden).map((msg, i, arr) => (
              <div key={i} className="fade-in" style={{ marginBottom:28, display:"flex", flexDirection:"column", alignItems:msg.role === "user" ? "flex-end" : "flex-start" }}>
                {msg.role === "assistant" && (
                  <div style={{ fontSize:10, color:C.gold, letterSpacing:"0.15em", textTransform:"uppercase", marginBottom:8, display:"flex", alignItems:"center", gap:8 }}>
                    Auditor
                    {isSpeaking && i === arr.length - 1 && (
                      <span style={{ display:"flex", gap:2 }}>
                        {[0,1,2].map(j => <span key={j} style={{ display:"inline-block", width:2, height:8, background:C.gold, borderRadius:1, animation:`pulse 0.7s ease-in-out ${j*0.15}s infinite` }}/>)}
                      </span>
                    )}
                  </div>
                )}
                <div style={{
                  maxWidth:"85%", padding:msg.role === "assistant" ? "20px 24px" : "12px 18px",
                  background:msg.role === "assistant" ? C.panel : C.goldFaint,
                  border:`1px solid ${msg.role === "assistant" ? C.border : C.goldDim}`,
                  ...(msg.role === "assistant" ? { ...serif, fontSize:20, fontWeight:300, lineHeight:1.7, color:C.white } : { fontSize:14, fontWeight:300, color:C.text, lineHeight:1.6 }),
                  whiteSpace:"pre-wrap"
                }}>
                  {msg.content}
                </div>
              </div>
            ))}
            {loading && (
              <div style={{ display:"flex", gap:6, padding:"8px 0" }}>
                {[0,1,2].map(i => <div key={i} style={{ width:7, height:7, borderRadius:"50%", background:C.gold, animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite` }}/>)}
              </div>
            )}
            <div ref={bottomRef}/>
          </div>

          {/* Input bar */}
          <div style={{ borderTop:`1px solid ${C.border}`, padding:"14px 20px", background:C.panel, flexShrink:0 }}>
            {sendError && (
              <div style={{ maxWidth:700, margin:"0 auto 10px", padding:"9px 14px", background:"rgba(180,60,60,0.12)", border:"1px solid rgba(180,60,60,0.35)", display:"flex", alignItems:"center", justifyContent:"space-between", gap:10 }}>
                <span style={{ fontSize:13, color:"#e07070" }}>⚠ {sendError}</span>
                <button onClick={() => setSendError(null)} style={{ background:"none", border:"none", color:"#e07070", cursor:"pointer", fontSize:18, lineHeight:1 }}>×</button>
              </div>
            )}
            <div style={{ maxWidth:700, margin:"0 auto", display:"flex", gap:8, alignItems:"flex-end" }}>
              <textarea
                ref={inputRef} value={input} rows={2}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
                placeholder={isListening ? "Listening… release to stop" : "Type your response… (Enter to send)"}
                disabled={loading}
                style={{ flex:1, background:C.bg, border:`1px solid ${isListening ? "rgba(220,80,80,0.5)" : C.border}`, color:C.text, fontSize:14, fontWeight:300, padding:"11px 14px", resize:"none", lineHeight:1.6, fontFamily:"'Jost', sans-serif", opacity:loading ? 0.5 : 1, transition:"border-color 0.2s" }}
              />

              {/* Mic button — tap-to-toggle on mobile, hold on desktop */}
              {voiceEnabled && (
                <button
                  {...(isMobile
                    ? { onClick: toggleListening }
                    : { onMouseDown: startListening, onMouseUp: stopListening }
                  )}
                  disabled={loading}
                  title={isMobile ? "Tap to speak / tap to stop" : "Hold to speak"}
                  style={{ background:isListening ? "rgba(180,60,60,0.2)" : C.panel, border:`1px solid ${isListening ? "rgba(220,80,80,0.7)" : C.border}`, color:isListening ? "#e07070" : C.textMuted, fontSize:20, padding:"11px 14px", cursor:loading ? "not-allowed" : "pointer", transition:"all 0.15s", alignSelf:"stretch", userSelect:"none", animation:isListening ? "micPulse 1s ease-in-out infinite" : "none" }}
                >
                  {isListening ? "●" : "◉"}
                </button>
              )}

              <button onClick={sendMessage} disabled={loading || !input.trim()}
                style={{ background:input.trim() && !loading ? C.gold : C.panel, border:`1px solid ${C.border}`, color:input.trim() && !loading ? "#0b0d17" : C.textDim, fontSize:13, fontWeight:500, padding:"11px 18px", cursor:input.trim() && !loading ? "pointer" : "not-allowed", transition:"all 0.2s", whiteSpace:"nowrap", alignSelf:"stretch" }}
              >Send</button>
            </div>
            <p style={{ maxWidth:700, margin:"7px auto 0", fontSize:11, color:C.textDim, textAlign:"center" }}>
              {voiceEnabled ? (isMobile ? "Tap ◉ to start speaking · Tap again to stop · Press Send" : "Hold ◉ to speak · Release to stop · Enter to send") : "Type your response and press Enter or Send"}
            </p>
          </div>
        </div>

        {/* Notes sidebar */}
        {showSidebar && (
          <div className="fade-in" style={{ width:270, borderLeft:`1px solid ${C.border}`, background:C.panel, display:"flex", flexDirection:"column", flexShrink:0 }}>
            <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}` }}>
              <p style={{ ...serif, fontSize:16, color:C.white, marginBottom:3 }}>Session Notes</p>
              <p style={{ fontSize:12, color:C.textMuted }}>Record cognitions & realisations</p>
            </div>
            <div style={{ flex:1, overflowY:"auto", padding:16 }}>
              {cognitions.length === 0
                ? <p style={{ fontSize:13, color:C.textDim, textAlign:"center", marginTop:24, fontStyle:"italic" }}>No notes yet</p>
                : cognitions.map((c, i) => (
                  <div key={i} style={{ borderLeft:`2px solid ${C.gold}`, paddingLeft:12, marginBottom:16 }}>
                    <p style={{ fontSize:13, color:C.text, lineHeight:1.5, marginBottom:4 }}>{c.text}</p>
                    <p style={{ fontSize:11, color:C.textDim }}>{c.time}</p>
                  </div>
                ))
              }
            </div>
            <div style={{ padding:14, borderTop:`1px solid ${C.border}` }}>
              <textarea value={noteInput} onChange={e => setNoteInput(e.target.value)} placeholder="Note a cognition…" rows={3}
                style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, color:C.text, fontSize:13, padding:"9px 11px", resize:"none", marginBottom:8, fontFamily:"'Jost', sans-serif" }}
              />
              <button onClick={addCognition} disabled={!noteInput.trim()}
                style={{ width:"100%", background:noteInput.trim() ? C.goldFaint : "transparent", border:`1px solid ${noteInput.trim() ? C.goldDim : C.border}`, color:noteInput.trim() ? C.gold : C.textDim, fontSize:12, letterSpacing:"0.1em", padding:8, cursor:noteInput.trim() ? "pointer" : "not-allowed" }}
              >Save Cognition</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );

  // ─── SESSION CLOSE ────────────────────────────────────────────────────────────
  if (screen === "close") return (
    <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", padding:"48px 24px" }}>
      <div className="fade-in" style={{ maxWidth:560, width:"100%", textAlign:"center" }}>
        <div style={{ width:48, height:48, margin:"0 auto 24px", border:`1px solid ${C.gold}`, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", color:C.gold, fontSize:20 }}>◎</div>
        <h2 style={{ ...serif, fontSize:34, fontWeight:300, color:C.white, marginBottom:8 }}>End of Session</h2>
        <p style={{ ...serif, fontSize:16, fontStyle:"italic", color:C.gold, marginBottom:28 }}>{selectedProcess?.name} — {formatTime(sessionSeconds)}</p>
        <div style={{ width:40, height:1, background:C.gold, margin:"0 auto 36px", opacity:0.6 }}/>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:36 }}>
          {[
            { label:"Duration", val:formatTime(sessionSeconds) },
            { label:"Exchanges", val:messages.filter(m => m.role==="user" && !m.hidden).length },
            { label:"Cognitions", val:cognitions.length },
          ].map(s => (
            <div key={s.label} style={{ background:C.panel, border:`1px solid ${C.border}`, padding:"16px 12px", textAlign:"center" }}>
              <p style={{ ...serif, fontSize:26, fontWeight:300, color:C.gold, marginBottom:4 }}>{s.val}</p>
              <p style={{ fontSize:11, color:C.textMuted }}>{s.label}</p>
            </div>
          ))}
        </div>

        {cognitions.length > 0 && (
          <div style={{ textAlign:"left", background:C.panel, border:`1px solid ${C.border}`, padding:24, marginBottom:28 }}>
            <p style={{ ...serif, fontSize:18, color:C.white, marginBottom:16 }}>Session Cognitions</p>
            {cognitions.map((c, i) => (
              <div key={i} style={{ borderLeft:`2px solid ${C.gold}`, paddingLeft:16, marginBottom:14 }}>
                <p style={{ fontSize:14, color:C.text, lineHeight:1.6, marginBottom:4 }}>{c.text}</p>
                <p style={{ fontSize:11, color:C.textDim }}>at {c.time}</p>
              </div>
            ))}
          </div>
        )}

        <p style={{ fontSize:14, fontWeight:300, color:C.textMuted, lineHeight:1.8, marginBottom:36 }}>
          The session is complete. Take a moment before returning to your day. Any gains you experienced are yours.
        </p>

        <div style={{ display:"flex", gap:12, justifyContent:"center" }}>
          <button onClick={() => { resetState(); setScreen("select"); }}
            style={{ background:"transparent", border:`1px solid ${C.gold}`, color:C.gold, fontSize:13, fontWeight:500, letterSpacing:"0.12em", textTransform:"uppercase", padding:"14px 32px", cursor:"pointer" }}
          >New Session</button>
          <button onClick={() => { resetState(); setScreen("welcome"); }}
            style={{ background:"transparent", border:`1px solid ${C.border}`, color:C.textMuted, fontSize:13, letterSpacing:"0.12em", textTransform:"uppercase", padding:"14px 32px", cursor:"pointer" }}
          >Home</button>
        </div>
      </div>
    </div>
  );

  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
